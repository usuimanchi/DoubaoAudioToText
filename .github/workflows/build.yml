name: 构建发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

jobs:
  # ── Windows CLI + GUI ──
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust + 缓存工具
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 配置 sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: 构建 CLI + GUI
        run: |
          cargo build --release -p volc_auc_batch_client
          cargo build --release -p doubao-transcriber

      - name: 打包发布目录
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pkg | Out-Null
          Copy-Item target/release/volc_auc_batch_client.exe pkg/
          Copy-Item target/release/doubao-transcriber.exe pkg/
          Copy-Item USAGE.md pkg/使用手册.txt
          Copy-Item CHANGELOG.md pkg/更新说明.txt

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: pkg/*

  # ── macOS (CLI: Universal, GUI: ARM64) ──
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust 目标
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: 配置 sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: 构建 CLI（Universal）
        run: |
          cargo build --release -p volc_auc_batch_client --target aarch64-apple-darwin
          cargo build --release -p volc_auc_batch_client --target x86_64-apple-darwin
          mkdir -p pkg
          lipo -create \
            target/aarch64-apple-darwin/release/volc_auc_batch_client \
            target/x86_64-apple-darwin/release/volc_auc_batch_client \
            -output pkg/volc_auc_batch_client
          lipo -info pkg/volc_auc_batch_client

      - name: 构建 GUI（ARM64 only）
        run: |
          cargo build --release -p doubao-transcriber --target aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/doubao-transcriber pkg/

      - name: 打包文档
        run: |
          cp USAGE.md "pkg/使用手册.txt"
          cp CHANGELOG.md "pkg/更新说明.txt"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: pkg/*
          include-hidden-files: false

  # ── 创建 GitHub Release（仅 tag 推送时）──
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 打包为 zip
        run: |
          VERSION="${{ github.ref_name }}"
          cd artifacts
          for d in */; do
            dirname=$(basename "$d")
            case "$dirname" in
              windows-dist) newname="AnyModelAudioToText-${VERSION}-windows" ;;
              macos-dist)   newname="AnyModelAudioToText-${VERSION}-macos-arm64" ;;
              *)            continue ;;
            esac
            mkdir -p "$newname"
            mv "$dirname"/* "$newname"/ 2>/dev/null || true
            rmdir "$dirname"
            zip -r "${newname}.zip" "$newname"
            echo "Created: ${newname}.zip ($(stat -c%s "${newname}.zip") bytes)"
          done

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} AnyModelAudioToText
          body: |
            ## ${{ github.ref_name }}

            ### 下载

            **Windows** → 下载 `AnyModelAudioToText-*-windows.zip`，解压双击 `doubao-transcriber.exe`

            **Mac** → 下载 `AnyModelAudioToText-*-macos-arm64.zip`，解压运行 `./doubao-transcriber`

            > ffmpeg 首次运行时会自动下载。国内用户自动走清华镜像源。

            ---
            [📦 Latest Release](https://github.com/usuimanchi/AnyModelAudioToText/releases/latest)
          files: artifacts/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
