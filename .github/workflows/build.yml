name: 构建发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Windows CLI + GUI ──
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: 安装 Rust MSVC
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: 构建 CLI
        run: cargo build --release -p volc_auc_batch_client

      - name: 构建 Windows GUI
        run: cargo build --release -p doubao-transcriber

      - name: 打包发布目录
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          if ($VERSION -notmatch '^v') { $VERSION = "latest" }
          $PKG_DIR = "AnyModelAudioToText-$VERSION-windows"
          New-Item -ItemType Directory -Force -Path $PKG_DIR
          Copy-Item target/release/volc_auc_batch_client.exe $PKG_DIR/
          Copy-Item target/release/doubao-transcriber.exe $PKG_DIR/
          Copy-Item dist/使用手册.txt $PKG_DIR/
          Copy-Item dist/更新说明.txt $PKG_DIR/
          # ffmpeg 提示（用户需自行放入同目录，或启动时自动下载）
          "# ffmpeg not bundled - run app once and it will auto-download" | Out-File $PKG_DIR/ffmpeg说明.txt -Encoding utf8

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: AnyModelAudioToText-*-windows/

  # ── macOS (ARM64) ──
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: 安装 Rust 目标
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 构建 Mac ARM64 CLI + GUI
        run: |
          cargo build --release -p volc_auc_batch_client
          cargo build --release -p doubao-transcriber

      - name: 打包发布目录
        run: |
          VERSION="${GITHUB_REF_NAME}"
          [[ "$VERSION" != v* ]] && VERSION="latest"
          PKG_DIR="AnyModelAudioToText-${VERSION}-macos-arm64"
          mkdir -p "$PKG_DIR"
          cp target/release/volc_auc_batch_client "$PKG_DIR/"
          cp target/release/doubao-transcriber "$PKG_DIR/"
          cp dist/使用手册.txt "$PKG_DIR/"
          cp dist/更新说明.txt "$PKG_DIR/"
          # Mac 用户需 brew install ffmpeg 或启动时自动下载
          echo "Mac 用户首次运行时会自动引导安装 ffmpeg。或自行运行: brew install ffmpeg" > "$PKG_DIR/ffmpeg说明.txt"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: AnyModelAudioToText-*-macos-arm64/

  # ── 创建 GitHub Release（仅 tag 推送时）──
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 打包为 zip
        run: |
          cd artifacts
          for dir in */; do
            dirname=$(basename "$dir")
            zip -r "../${dirname}.zip" "$dir"
          done

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} AnyModelAudioToText
          body: |
            ## ${{ github.ref_name }}

            ### 下载

            **Windows 用户**：下载 `AnyModelAudioToText-*-windows.zip`，解压后双击 `doubao-transcriber.exe`。ffmpeg 首次运行时会自动下载。

            **Mac 用户**：下载 `AnyModelAudioToText-*-macos-arm64.zip`，解压后运行 `./doubao-transcriber`。ffmpeg 首次运行时会自动下载（或 `brew install ffmpeg`）。

            ### 变更

            详见 `dist/更新说明.txt`
          files: ./*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
